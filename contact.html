<!doctype html><html lang="zh-Hant"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width, initial-scale=1"><title>聯絡｜謝秀英藝術館</title><meta name="theme-color" content="#6bc2ba"><link rel="icon" href="favicon.ico"><link rel="manifest" href="manifest.json"><link rel="stylesheet" href="style.css"></head><body data-page="contact"><header class="topbar" id="top"><a class="brand" href="index.html"><span class="brand-mark">秀</span><span><strong>謝秀英</strong><small>Hsieh Hsiu-Ying</small></span></a><div class="nav-shell"><nav class="main-nav"><a class="nav-link" href="index.html">🏠 Home</a><a class="nav-link" href="about.html">關於秀英</a><a class="nav-link" href="gallery.html">藝廊</a><a class="nav-link" href="works.html">作品集</a><a class="nav-link" href="exhibitions.html">展覽經歷</a><a class="nav-link" href="history.html">歷史回顧</a><a class="nav-link" href="contact.html">聯絡</a></nav></div></header><main class="subpage"><section class="page-hero"><p class="eyebrow">Contact</p><h1>聯絡</h1><p>作品收藏、展覽邀約、課程研習、媒體採訪與其他合作需求。</p></section><section class="content-card contact-card"><h2>需求表單</h2><p>為避免垃圾訊息與保護雙方資料，正式版預計需先以 Google 或 LINE 登入後，才能送出需求表單。</p><div id="formLock" class="form-lock"><strong>請先登入後填寫聯絡需求</strong><div class="login-row"><button class="login-btn google" data-login="google">使用 Google 登入</button><button class="login-btn line" data-login="line">使用 LINE 登入</button></div><p class="works-note">目前為前端骨架示範；正式上線會串接 OAuth 與後台收件。</p></div><form id="contactForm" class="contact-form" hidden><div class="form-grid"><label>姓名<input name="name" required placeholder="請輸入姓名"></label><label>聯絡電話<input name="phone" placeholder="可填手機或市話"></label><label>Email<input name="email" type="email" required placeholder="example@email.com"></label><label>聯絡原因<select name="reason" required><option value="">請選擇</option></select></label></div><label>詳細需求<textarea name="message" required placeholder="請描述想詢問的作品、展覽日期、合作內容或其他需求。"></textarea></label><button class="btn primary" type="submit">送出需求，等待主動聯繫</button><p id="formMessage" class="form-message"></p></form><hr style="border:0;border-top:1px solid var(--line);margin:30px 0"><p>Facebook 粉專：<a href="https://www.facebook.com/XieXiuYing1960/" target="_blank" rel="noopener">謝秀英 Facebook 粉專</a></p></section></main><button class="to-top">↑</button><script src="api/cms.js"></script>
