<!doctype html><html lang="zh-Hant"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>API 設定｜CMS</title><link rel="stylesheet" href="../style.css"><link rel="stylesheet" href="admin.css"></head><body class="admin-page"><main class="admin-card"><h1>API 設定</h1><label class="admin-label">Apps Script Web App URL<textarea id="api" rows="5" placeholder="https://script.google.com/macros/s/.../exec"></textarea></label><label class="admin-label">管理寫入 Token（寫回作品資料用，可先空白）<input id="token" type="password" placeholder="adminWriteToken"></label><div class="admin-actions"><button class="btn primary" id="save">儲存設定</button><button class="btn ghost" id="test">測試連線</button><a class="btn ghost" href="index.html">回後台</a></div><p id="msg" class="admin-status"></p></main><script src="../api/cms.js"></script><script>api.value=XxyCms.getStoredApiUrl();token.value=XxyCms.getAdminToken();save.onclick=()=>{XxyCms.setStoredApiUrl(api.value);XxyCms.setAdminToken(token.value);msg.textContent='已儲存於此瀏覽器。正式上線可再寫入 data/site-config.json。'};test.onclick=async()=>{try{XxyCms.setStoredApiUrl(api.value);XxyCms.setAdminToken(token.value);msg.textContent='檢查中...';const p=await XxyCms.get('ping');msg.textContent='API 已連線：'+(p.version||'OK')+' / '+(p.time||p.updatedAt||'');}catch(e){msg.textContent='連線失敗：'+e.message;}};</script></body></html>
