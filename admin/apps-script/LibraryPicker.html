<!doctype html>
<html lang="zh-Hant">
<head>
  <base target="_top">
  <meta charset="utf-8">
  <style>
    *{box-sizing:border-box}body{font-family:Arial,"Noto Sans TC",sans-serif;margin:0;padding:22px;color:#173f3b;background:#f4fbfa}
    h2{margin:0 0 8px;font-size:22px}.hint{margin:0 0 18px;color:#56736f;font-size:14px;line-height:1.6}
    label{display:block;font-weight:700;margin-bottom:7px}select{width:100%;padding:12px;border:1px solid #badbd7;border-radius:12px;background:white;font-size:15px}
    .info{margin-top:14px;padding:12px;border-radius:12px;background:#e4f5f2;font-size:14px;line-height:1.6;min-height:70px}
    .actions{display:flex;justify-content:flex-end;gap:10px;margin-top:20px}button{border:0;border-radius:999px;padding:11px 20px;font-weight:700;cursor:pointer}
    .cancel{background:white;border:1px solid #c9ddda;color:#315b57}.run{background:#61b8ae;color:white}.run:disabled{opacity:.55;cursor:not-allowed}
    .status{margin-top:12px;font-size:14px;color:#315b57}.error{color:#b53939}.ok{color:#16735f}
  </style>
</head>
<body>
  <h2><?= mode === 'cdn' ? '增加 CDN 圖片網址' : '更新 GitHub WebP 網址' ?></h2>
  <p class="hint">清單直接讀取「作品庫管理」分頁的 sheetName 欄，自第 3 列開始。一次只更新一個作品庫分頁。</p>
  <label for="library">選擇要更新的作品庫</label>
  <select id="library"></select>
  <div id="info" class="info"></div>
  <div id="status" class="status"></div>
  <div class="actions">
    <button class="cancel" onclick="google.script.host.close()">取消</button>
    <button id="run" class="run" onclick="runAction()"><?= mode === 'cdn' ? '增加 CDN 網址' : '更新 GitHub 網址' ?></button>
  </div>
<script>
var MODE = <?!= JSON.stringify(mode) ?>;
var LIBRARIES = <?!= librariesJson ?>;
var select = document.getElementById('library');
var info = document.getElementById('info');
var status = document.getElementById('status');
var runBtn = document.getElementById('run');
LIBRARIES.forEach(function(lib){
  var option = document.createElement('option');
  option.value = lib.sheetName;
  option.textContent = lib.libraryName + '｜' + lib.sheetName + (lib.ready ? '' : '（找不到分頁）');
  option.disabled = !lib.ready;
  select.appendChild(option);
});
function updateInfo(){
  var lib = null;
  for(var i=0;i<LIBRARIES.length;i++){if(LIBRARIES[i].sheetName===select.value){lib=LIBRARIES[i];break;}}
  if(!lib){info.textContent='沒有可用作品庫';runBtn.disabled=true;return;}
  info.innerHTML = '<b>' + escapeHtml(lib.libraryName) + '</b><br>作品庫分頁：' + escapeHtml(lib.sheetName) + '<br>來源列：作品庫管理第 ' + lib.rowNumber + ' 列';
  runBtn.disabled = !lib.ready;
}
function escapeHtml(v){return String(v||'').replace(/[&<>"']/g,function(m){return {'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m];});}
function runAction(){
  var sheetName = select.value;
  if(!sheetName)return;
  runBtn.disabled=true;select.disabled=true;status.className='status';
  status.textContent = MODE === 'cdn' ? '正在增加 CDN 網址，請勿關閉視窗…' : '正在更新 GitHub 網址，請勿關閉視窗…';
  google.script.run
    .withSuccessHandler(function(result){
      status.className='status ok';status.textContent=result.message || '完成';
      runBtn.textContent='完成';
      setTimeout(function(){google.script.host.close();},1800);
    })
    .withFailureHandler(function(err){
      status.className='status error';status.textContent='失敗：' + (err && err.message ? err.message : err);
      runBtn.disabled=false;select.disabled=false;
    })
    .runArtworkLibraryAction(MODE,sheetName);
}
select.addEventListener('change',updateInfo);updateInfo();
</script>
</body>
</html>
