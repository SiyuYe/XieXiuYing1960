<!doctype html><html lang="zh-Hant"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>編輯作品｜CMS v7.3-A2</title><link rel="stylesheet" href="../style.css?v=7909c"><link rel="stylesheet" href="admin.css"></head><body class="admin-page"><main class="admin-wide"><header class="admin-top"><div><h1>編輯作品</h1><p id="subtitle">讀取中...</p></div><div><a class="btn ghost" href="works.html">返回作品管理</a><a class="btn ghost" href="settings.html">API設定</a></div></header><section class="admin-edit-layout"><aside class="admin-preview"><img id="preview" src="../assets/images/art-placeholder-1.svg" alt="作品預覽"><div class="admin-status" id="meta"></div></aside><form id="form" class="admin-form" hidden><input type="hidden" name="artworkId"><div class="admin-form-grid"><label>中文作品名<input name="titleZh"></label><label>英文作品名<input name="titleEn"></label><label>年份<input name="year"></label><label>尺寸<input name="size" placeholder="例：30×127 cm"></label><label>作品類型ID<input name="artworkTypeId" placeholder="例：GB / JC / XY / SF / CL"></label><label>作品類型<input name="artworkTypeName" placeholder="工筆、膠彩、寫意、書法、收藏品"></label><label>題材ID<input name="subjectIds"></label><label>題材<input name="subjectNames"></label><label>材質ID<input name="materialId"></label><label>材質<input name="material"></label><label>媒材ID<input name="mediumId"></label><label>媒材<input name="medium"></label><label>收藏狀態ID<input name="collectionStatusId"></label><label>收藏狀態<input name="collectionStatus"></label><label>公開價格文字<input name="priceNote" placeholder="公開顯示建議：洽詢"></label><label>收藏價（後台）<input name="collectionPrice"></label><label>幣別<input name="collectionCurrency" placeholder="TWD"></label><label>收藏價公開狀態<input name="collectionPriceVisibility" placeholder="隱藏 / 公開"></label><label>收藏資訊公開狀態<input name="collectionInfoVisibility" placeholder="隱藏 / 公開"></label><label>收藏者<input name="collectorName"></label><label>收藏日期<input name="collectionDate" placeholder="YYYY-MM-DD"></label><label>排序<input name="sort"></label></div><div class="admin-checks"><label><input type="checkbox" name="isSold"> 是否已售出</label><label><input type="checkbox" name="isForSale"> 是否可販售</label><label><input type="checkbox" name="allowInquiry"> 是否接受洽詢</label><label><input type="checkbox" name="allowPrint"> 是否接受複製畫委託</label><label><input type="checkbox" name="isPublic"> 官網公開</label><label><input type="checkbox" name="isHomeHero"> 首頁輪播</label><label><input type="checkbox" name="isFeatured"> 精選作品</label></div><label>作品介紹<textarea name="description" rows="5"></textarea></label><div class="admin-form-grid"><label>SEO 標題<input name="seoTitle"></label><label>SEO 描述<textarea name="seoDescription" rows="3"></textarea></label></div><div class="admin-actions"><button class="btn primary" type="submit">儲存到 Google 試算表</button><button class="btn ghost" type="button" id="autoSeo">自動產生 SEO</button></div><p id="msg" class="admin-status"></p></form></section></main><script src="../api/cms.js?v=7909c"></script><script src="admin-images.js?v=7909c"></script><script src="auth-guard.js"></script><script>const params=new URLSearchParams(location.search);const id=params.get('id');const form=document.getElementById('form');const msg=document.getElementById('msg');const checks=['isSold','isForSale','allowInquiry','allowPrint','isPublic','isHomeHero','isFeatured'];function esc(s){return String(s||'').replace(/[&<>"']/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m]));}function truth(v){return v===true||String(v).toUpperCase()==='TRUE'||String(v)==='是';}function setVal(name,val){const el=form.elements[name];if(!el)return;if(el.type==='checkbox')el.checked=truth(val);else el.value=val==null?'':val;}function getPayload(){const data={};Array.from(form.elements).forEach(el=>{if(!el.name)return;data[el.name]=el.type==='checkbox'?el.checked:el.value.trim();});return data;}function fill(a){subtitle.textContent=(a.artworkId||'')+'｜'+(a.artistName||'')+'｜'+(a.originalFileName||'');XxyAdminImages.configure(preview,a,'large');meta.innerHTML='<b>'+esc(a.artworkId||'')+'</b><br>'+esc(a.originalFileName||'')+'<br>'+esc(a.drivePath||'');['artworkId','titleZh','titleEn','year','size','artworkTypeId','artworkTypeName','subjectIds','subjectNames','materialId','material','mediumId','medium','collectionStatusId','collectionStatus','priceNote','collectionPrice','collectionCurrency','collectionPriceVisibility','collectionInfoVisibility','collectorName','collectionDate','sort','description','seoTitle','seoDescription'].forEach(k=>setVal(k,a[k]));checks.forEach(k=>setVal(k,a[k]));form.hidden=false;}autoSeo.onclick=()=>{const title=form.elements.titleZh.value||form.elements.artworkId.value;const year=form.elements.year.value;const medium=form.elements.medium.value||form.elements.material.value;form.elements.seoTitle.value=title+'｜謝秀英書畫藝術館';form.elements.seoDescription.value='《'+title+'》為謝秀英'+(year?year+'年':'')+(medium?medium:'書畫')+'作品，作品資訊與收藏洽詢請見謝秀英書畫藝術館。';};form.onsubmit=async e=>{e.preventDefault();try{msg.textContent='儲存中...';const res=await XxyCms.post('adminUpdateArtwork',getPayload());msg.textContent=res.message||'已儲存。';}catch(err){msg.textContent='儲存失敗：'+err.message+'（請確認 settings.html 已填管理寫入 Token，且試算表「網站設定」有相同 adminWriteToken）';}};XxyAdminReady.then(async()=>{try{if(!id)throw new Error('缺少作品 ID');const data=await XxyCms.artwork(id,{cacheMs:300000});const a=data.artwork;if(!a)throw new Error('找不到作品：'+id);fill(a);}catch(e){subtitle.textContent='讀取失敗：'+e.message;}});</script></body></html>
