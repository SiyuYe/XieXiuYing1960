<!doctype html>
<html lang="zh-Hant">
<head>
<meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>作品管理｜CMS V7.6 Gallery Manager</title>
<link rel="stylesheet" href="../style.css"><link rel="stylesheet" href="admin.css">
</head>
<body class="admin-page">
<main class="admin-wide gallery-manager-page">
<header class="admin-top">
  <div><h1>作品管理</h1><p>CMS V7.6｜Gallery Manager 畫廊式作品管理</p></div>
  <div><a class="btn ghost" href="sort.html">排序中心</a><a class="btn ghost" href="settings.html">API設定</a><a class="btn ghost" href="index.html">後台首頁</a></div>
</header>

<section class="admin-toolbar-panel gallery-toolbar-panel">
  <div class="admin-tools gallery-tools">
    <select id="library"><option value="">全部作者／作品庫</option></select>
    <input id="q" autocomplete="off" placeholder="搜尋中文名、英文名或作品編號">
    <select id="filter">
      <option value="">全部作品</option><option value="featured">精選作品</option><option value="hero">首頁輪播</option>
      <option value="public">官網公開</option><option value="hidden">官網隱藏</option><option value="gallery">線上藝廊</option>
    </select>
  </div>
  <p id="summary" class="admin-status">載入中…</p>
</section>

<section id="batchPanel" class="batch-panel gallery-batch-panel" hidden>
  <div class="batch-summary"><strong>已選 <span id="selectedCount">0</span> 件</strong><button id="clearSelection" type="button" class="batch-link">清除選取</button></div>
  <div class="gallery-batch-actions">
    <button type="button" data-bool-field="isPublic" data-bool-value="true">批次公開</button>
    <button type="button" data-bool-field="isPublic" data-bool-value="false">批次隱藏</button>
    <button type="button" data-bool-field="isHomeHero" data-bool-value="true">加入首頁輪播</button>
    <button type="button" data-bool-field="isHomeHero" data-bool-value="false">移出首頁輪播</button>
    <button type="button" data-bool-field="isFeatured" data-bool-value="true">加入精選</button>
    <button type="button" data-bool-field="isFeatured" data-bool-value="false">移出精選</button>
    <button type="button" data-bool-field="isGallery" data-bool-value="true">加入線上藝廊</button>
    <button type="button" data-bool-field="isGallery" data-bool-value="false">移出線上藝廊</button>
    <select id="batchCollectionStatus"><option value="">批次收藏狀態…</option></select>
    <button id="applyBatchCollection" type="button">套用收藏狀態</button>
  </div>
  <p id="batchMessage" class="batch-message"></p>
</section>

<section id="grid" class="gallery-manager-grid" aria-live="polite"></section>
<div class="admin-load-more"><button id="more" class="btn primary" type="button" hidden>載入更多作品</button></div>
<div id="sentinel" aria-hidden="true"></div>
</main>

<script src="../api/cms.js"></script><script src="auth-guard.js"></script>
<script>
const PAGE_SIZE=16;
let page=1,loading=false,hasMore=true,requestSeq=0,controller=null,meta=null,lastSelectedId='';
const state={q:'',filter:'',libraryId:'',artistId:''};
const loaded=new Map(),selected=new Set(),dirtyCards=new Set();
let imageManifest={artworks:{},artworkOrder:[]};
const grid=document.getElementById('grid'),summary=document.getElementById('summary'),more=document.getElementById('more');
function esc(s){return String(s??'').replace(/[&<>"']/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m]));}
function bool(v){return v===true||String(v||'').toUpperCase()==='TRUE'||String(v||'')==='是';}
function normalizeArtworkId(a){return String(a?.artworkId||a?.id||'').trim().toUpperCase();}
function img(a){const id=normalizeArtworkId(a);return /^XH\d{4}$/.test(id)?`../images/artworks/1200/${id}.webp`:'../assets/images/art-placeholder-1.svg';}
async function ensureImageManifest(){if(Object.keys(imageManifest.artworks||{}).length)return imageManifest;try{const r=await fetch('../data/images-manifest.json?v=cms-v7.7.1-github-images',{cache:'force-cache'});if(r.ok)imageManifest=await r.json();}catch(_){ }return imageManifest;}
function text(v,fallback='—'){const s=String(v??'').trim();return s||fallback;}
function optionHtml(rows,idKey,nameKey,value){return '<option value="">未設定</option>'+rows.map(r=>`<option value="${esc(r[idKey])}" ${String(r[idKey])===String(value||'')?'selected':''}>${esc(r[nameKey]||r[idKey])}</option>`).join('');}
function nameById(rows,idKey,nameKey,id){const row=(rows||[]).find(r=>String(r[idKey])===String(id||''));return row?row[nameKey]||id:'';}
function listNames(a,nameField,idField,rows,idKey,nameKey){
 const direct=String(a[nameField]||'').trim();if(direct)return direct;
 const ids=String(a[idField]||'').split(',').map(x=>x.trim()).filter(Boolean);
 return ids.map(id=>nameById(rows,idKey,nameKey,id)).filter(Boolean).join('、');
}
function publicPrice(a){
 const visible=['公開','public','true','yes','顯示'].includes(String(a.collectionPriceVisibility||'').trim().toLowerCase())||bool(a.collectionPriceVisibility);
 if(visible&&String(a.collectionPrice||'').trim())return `${a.collectionCurrency||'TWD'} ${a.collectionPrice}`;
 return String(a.priceNote||a.publicPriceNote||'').trim()||'未公開';
}
function statusClass(name){
 const s=String(name||'');
 if(/可洽詢|可販售|available/i.test(s))return 'available';
 if(/私人收藏|收藏/i.test(s))return 'private';
 if(/已售|售出|sold/i.test(s))return 'sold';
 if(/非賣|not for sale/i.test(s))return 'not-sale';
 return 'unset';
}
function hoverInfo(a){
 const type=a.artworkTypeName||nameById(meta.artworkTypes,'typeId','nameZh',a.artworkTypeId);
 const subjects=listNames(a,'subjectNames','subjectIds',meta.subjects,'subjectId','nameZh');
 const material=a.material||nameById(meta.materials,'materialId','nameZh',a.materialId);
 const medium=listNames(a,'medium','mediumId',meta.mediums,'mediumId','nameZh');
 return `<div class="gallery-hover-info" aria-hidden="true">
  <dl><div><dt>作品編號</dt><dd>${esc(text(a.artworkId||a.id))}</dd></div>
  <div><dt>作品類型</dt><dd>${esc(text(type))}</dd></div>
  <div><dt>作品題材</dt><dd>${esc(text(subjects))}</dd></div>
  <div><dt>作品材質</dt><dd>${esc(text(material))}</dd></div>
  <div><dt>作品媒材</dt><dd>${esc(text(medium))}</dd></div>
  <div><dt>公開售價</dt><dd>${esc(publicPrice(a))}</dd></div></dl>
 </div>`;
}
function card(a){
 const id=a.artworkId||a.id||'',status=a.collectionStatus||nameById(meta.collectionStatuses,'statusId','nameZh',a.collectionStatusId)||'未設定';
 return `<article class="gallery-manager-card" data-id="${esc(id)}">
  <label class="gallery-card-select" title="選取作品"><input type="checkbox" data-select="${esc(id)}" ${selected.has(id)?'checked':''}><span></span></label>
  <div class="gallery-card-image-wrap skeleton">
   <img src="${esc(img(a))}" loading="lazy" decoding="async" alt="${esc(a.titleZh||'作品')}" onload="this.parentElement.classList.remove('skeleton');this.classList.add('loaded')">
   ${hoverInfo(a)}
  </div>
  <div class="gallery-card-body">
   <h2>${esc(text(a.titleZh,'未命名'))}</h2>
   <p class="gallery-card-meta">${esc([a.year,a.size].filter(v=>String(v||'').trim()).join('｜')||'—')}</p>
   <label class="gallery-status-field"><span class="status-badge ${statusClass(status)}">${esc(status)}</span>
    <select data-field="collectionStatusId">${optionHtml(meta.collectionStatuses,'statusId','nameZh',a.collectionStatusId)}</select>
   </label>
   <div class="gallery-card-checks">
    <label><input type="checkbox" data-field="isPublic" ${bool(a.isPublic)?'checked':''}>官網公開</label>
    <label><input type="checkbox" data-field="isHomeHero" ${bool(a.isHomeHero)?'checked':''}>首頁輪播</label>
    <label><input type="checkbox" data-field="isFeatured" ${bool(a.isFeatured)?'checked':''}>精選作品</label>
    <label><input type="checkbox" data-field="isGallery" ${bool(a.isGallery)?'checked':''}>線上藝廊</label>
   </div>
   <button class="gallery-card-save" type="button">儲存</button>
  </div>
 </article>`;
}
function cardPayload(cardEl){const payload={artworkId:cardEl.dataset.id};cardEl.querySelectorAll('[data-field]').forEach(el=>payload[el.dataset.field]=el.type==='checkbox'?el.checked:el.value);return payload;}
function updateCardStatus(cardEl){const sel=cardEl.querySelector('[data-field="collectionStatusId"]'),name=nameById(meta.collectionStatuses,'statusId','nameZh',sel.value)||'未設定',badge=cardEl.querySelector('.status-badge');badge.textContent=name;badge.className='status-badge '+statusClass(name);}
function markCardDirty(cardEl,on=true){if(!cardEl)return;const id=cardEl.dataset.id;if(on){dirtyCards.add(id);cardEl.classList.add('is-dirty');}else{dirtyCards.delete(id);cardEl.classList.remove('is-dirty');}}
function params(){return {page,pageSize:PAGE_SIZE,q:state.q,filter:state.filter,libraryId:state.libraryId,artistId:state.artistId};}
async function ensureMeta(){
 if(meta)return meta;await ensureImageManifest();meta=await XxyCms.adminMeta({cacheMs:10*60*1000});
 document.getElementById('library').innerHTML='<option value="">全部作者／作品庫</option>'+meta.libraries.map(x=>`<option value="${esc(x.libraryId)}">${esc(x.authorName||x.libraryName)}｜${esc(x.libraryName)}</option>`).join('');
 document.getElementById('batchCollectionStatus').innerHTML='<option value="">批次收藏狀態…</option>'+meta.collectionStatuses.map(x=>`<option value="${esc(x.statusId)}">${esc(x.nameZh||x.statusId)}</option>`).join('');
 return meta;
}
async function load(reset){
 if(loading)return;if(reset){page=1;hasMore=true;grid.innerHTML='';loaded.clear();selected.clear();dirtyCards.clear();lastSelectedId='';updateBatchPanel();}if(!hasMore)return;
 loading=true;more.hidden=true;summary.textContent='載入中…';const seq=++requestSeq;if(controller)controller.abort();controller=new AbortController();
 try{await ensureMeta();const data=await XxyCms.artworksPage(params(),{signal:controller.signal,cacheMs:120000});if(seq!==requestSeq)return;
  const list=data.artworks||[];list.forEach(a=>loaded.set(a.artworkId||a.id,a));grid.insertAdjacentHTML('beforeend',list.map(card).join(''));
  hasMore=Boolean(data.hasMore);summary.textContent=`顯示 ${loaded.size} / ${data.total||0} 件作品`;page++;more.hidden=!hasMore;updateBatchPanel();
 }catch(e){if(e.name!=='AbortError')summary.innerHTML='<span class="error">讀取失敗：'+esc(e.message)+'</span>';}finally{if(seq===requestSeq)loading=false;}
}
async function savePayload(payload){const row=meta.collectionStatuses.find(x=>String(x.statusId)===String(payload.collectionStatusId||''));payload.collectionStatus=row?row.nameZh||row.statusId:'';return XxyCms.post('adminUpdateArtwork',payload);}
function updateBatchPanel(){document.getElementById('selectedCount').textContent=selected.size;document.getElementById('batchPanel').hidden=selected.size===0;document.querySelectorAll('[data-select]').forEach(el=>el.checked=selected.has(el.dataset.select));}
function clearSelection(){selected.clear();lastSelectedId='';updateBatchPanel();}
function selectRange(fromId,toId,checked){const ids=[...grid.querySelectorAll('.gallery-manager-card')].map(el=>el.dataset.id),a=ids.indexOf(fromId),b=ids.indexOf(toId);if(a<0||b<0)return;ids.slice(Math.min(a,b),Math.max(a,b)+1).forEach(id=>checked?selected.add(id):selected.delete(id));}
function applyPatchToLoaded(ids,patch){ids.forEach(id=>{const item=loaded.get(id);if(item)Object.assign(item,patch);});}
async function runBatch(patch,label){if(!selected.size)return;const ids=[...selected],msg=document.getElementById('batchMessage');msg.textContent=`${label}處理中…`;try{const res=await XxyCms.batchUpdateArtworks(ids,patch);applyPatchToLoaded(ids,patch);msg.textContent=`完成：已更新 ${res.updatedCount||0} 件作品`;XxyCms.clearCache();clearSelection();await load(true);}catch(err){msg.textContent='批次更新失敗：'+err.message;}}

document.addEventListener('change',e=>{
 const selectBox=e.target.closest('[data-select]');
 if(selectBox){const id=selectBox.dataset.select;if(e.shiftKey&&lastSelectedId)selectRange(lastSelectedId,id,selectBox.checked);else selectBox.checked?selected.add(id):selected.delete(id);lastSelectedId=id;updateBatchPanel();return;}
 const field=e.target.closest('[data-field]');if(field){const cardEl=field.closest('.gallery-manager-card');if(field.dataset.field==='collectionStatusId')updateCardStatus(cardEl);markCardDirty(cardEl,true);}
});
document.addEventListener('click',async e=>{
 const save=e.target.closest('.gallery-card-save');if(!save)return;const cardEl=save.closest('.gallery-manager-card'),payload=cardPayload(cardEl);save.disabled=true;save.textContent='儲存中…';cardEl.classList.add('is-saving');
 try{await savePayload(payload);markCardDirty(cardEl,false);cardEl.classList.add('is-saved');save.textContent='✓ 已儲存';XxyCms.clearCache();setTimeout(()=>{save.textContent='儲存';cardEl.classList.remove('is-saved');},1500);}catch(err){save.textContent='儲存失敗';cardEl.classList.add('is-error');alert(err.message);setTimeout(()=>save.textContent='儲存',1800);}finally{save.disabled=false;cardEl.classList.remove('is-saving');}
});
document.getElementById('clearSelection').onclick=clearSelection;
document.querySelectorAll('[data-bool-field]').forEach(btn=>btn.onclick=()=>runBatch({[btn.dataset.boolField]:btn.dataset.boolValue==='true'},btn.textContent));
document.getElementById('applyBatchCollection').onclick=()=>{const id=document.getElementById('batchCollectionStatus').value;if(!id)return;const row=meta.collectionStatuses.find(x=>String(x.statusId)===String(id));runBatch({collectionStatusId:id,collectionStatus:row?row.nameZh||row.statusId:''},'收藏狀態');};
let timer;document.getElementById('q').addEventListener('input',e=>{clearTimeout(timer);timer=setTimeout(()=>{state.q=e.target.value.trim();load(true);},300);});
document.getElementById('filter').addEventListener('change',e=>{state.filter=e.target.value;load(true);});
document.getElementById('library').addEventListener('change',e=>{state.libraryId=e.target.value;load(true);});
more.onclick=()=>load(false);const io=new IntersectionObserver(entries=>{if(entries[0].isIntersecting&&hasMore&&!loading)load(false);},{rootMargin:'700px'});io.observe(document.getElementById('sentinel'));
XxyAdminReady.then(()=>load(true));
</script>
</body></html>
