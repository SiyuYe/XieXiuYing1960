<!doctype html><html lang="zh-Hant"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>作品管理｜CMS</title><link rel="stylesheet" href="../style.css"><link rel="stylesheet" href="admin.css"></head><body class="admin-page"><main class="admin-wide"><header class="admin-top"><div><h1>作品管理</h1><p>資料來源：Google 試算表 CMS API。v7 先完成讀取、搜尋、預覽；寫入功能下一步接 token 後啟用。</p></div><div><a class="btn ghost" href="settings.html">API設定</a><a class="btn ghost" href="index.html">後台首頁</a></div></header><section class="admin-tools"><input id="q" placeholder="搜尋作品名稱、編號、作者、檔名"><select id="filter"><option value="">全部作品</option><option value="missing">待補資料</option><option value="featured">精選</option><option value="hero">首頁輪播</option></select></section><section id="grid" class="admin-work-grid"></section></main><script src="../api/cms.js"></script><script>let works=[];function esc(s){return String(s||'').replace(/[&<>\"']/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;','\"':'&quot;',"'":'&#39;'}[m]));}function img(a){return a.thumbUrl||a.imageUrl||'../assets/images/art-placeholder-1.svg'}function render(){const term=q.value.trim().toLowerCase();const f=filter.value;let list=works.filter(a=>{const hay=[a.artworkId,a.titleZh,a.titleEn,a.artistName,a.originalFileName].join(' ').toLowerCase();if(term&&!hay.includes(term))return false;if(f==='missing'&&String(a.dataStatus||'').includes('待補')===false)return false;if(f==='featured'&&String(a.isFeatured).toUpperCase()!=='TRUE')return false;if(f==='hero'&&String(a.isHomeHero).toUpperCase()!=='TRUE')return false;return true;});grid.innerHTML=list.map(a=>`<article class="admin-work"><img src="${esc(img(a))}" loading="lazy"><div><b>${esc(a.titleZh||a.originalFileName||'未命名作品')}</b><small>${esc(a.artworkId)}｜${esc(a.artistName||'')}｜${esc(a.artworkTypeName||'')}</small><small>${esc([a.year,a.size,a.medium,a.material].filter(Boolean).join('｜'))}</small><span>${esc(a.dataStatus||'')}</span></div></article>`).join('')||'<p>沒有符合的作品。</p>'}q.oninput=render;filter.onchange=render;(async()=>{try{const data=await XxyCms.get('artworks');works=data.artworks||[];render();}catch(e){grid.innerHTML='<p class="error">讀取失敗：'+esc(e.message)+'</p>';}})();</script></body></html>
