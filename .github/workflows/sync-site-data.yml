name: Sync Site Data

on:
  schedule:
    # GitHub Actions 使用 UTC；每週日 19:00 UTC = 台灣每週一凌晨 03:00。
    - cron: "0 19 * * 0"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: sync-site-data
  cancel-in-progress: false

jobs:
  sync:
    name: Download and publish versioned site data
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Download Apps Script siteData
        env:
          SITE_DATA_URL: ${{ secrets.APPS_SCRIPT_SITE_DATA_URL }}
        run: |
          set -euo pipefail
          if [ -z "${SITE_DATA_URL:-}" ]; then
            echo "::error::尚未設定 Repository Secret：APPS_SCRIPT_SITE_DATA_URL"
            exit 1
          fi
          curl --fail --location --silent --show-error \
            --retry 3 --retry-delay 3 --retry-all-errors \
            --connect-timeout 20 --max-time 120 \
            --header "Cache-Control: no-cache" \
            "${SITE_DATA_URL}" \
            --output /tmp/site-data.download.json

      - name: Validate and publish versioned JSON
        id: site_data
        run: |
          python3 scripts/update_site_data.py \
            /tmp/site-data.download.json \
            data/site-data.json \
            data/site-version.json

      - name: Generate independent artwork pages
        run: |
          python3 scripts/generate_artwork_pages.py \
            data/site-data.json \
            templates/artwork-page.html \
            works \
            --manifest data/artwork-pages.json

      - name: Run STEP 1 + STEP 2 artwork page acceptance test
        run: |
          python3 scripts/test_generate_artwork_pages.py

      - name: Run STEP 3 artwork share acceptance test
        run: |
          python3 scripts/test_artwork_share.py
          node --check artwork-share.js
          node --check app.js

      - name: Update sitemap last modified date
        run: |
          python3 scripts/update_sitemap.py \
            sitemap.xml \
            "${{ steps.site_data.outputs.published_at }}"

      - name: Show validation summary
        run: |
          echo "狀態：${{ steps.site_data.outputs.status }}"
          echo "公開作品：${{ steps.site_data.outputs.artwork_count }}"
          echo "資料產生時間：${{ steps.site_data.outputs.generated_at }}"
          echo "資料版本：${{ steps.site_data.outputs.data_version }}"
          echo "發布時間：${{ steps.site_data.outputs.published_at }}"

      - name: Commit versioned site data
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/site-data.json data/site-version.json data/artwork-pages.json works templates/artwork-page.html scripts/generate_artwork_pages.py scripts/test_generate_artwork_pages.py scripts/test_artwork_share.py artwork-share.js app.js src/app.source.js style.css index.html about.html gallery.html works.html exhibitions.html history.html contact.html sitemap.xml
          git commit -m "chore: publish website data ${{ steps.site_data.outputs.data_version }}"
          git push
